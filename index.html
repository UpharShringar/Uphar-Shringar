  <script>
let isAdmin = false;
let cart = [];
let total = 0;
    function renderCart() {

  document.getElementById("cartTotal").innerText = total;

  if (cart.length === 0) {
    document.getElementById("cartItems").innerHTML = "No items in cart";
    return;
  }

  document.getElementById("cartItems").innerHTML =
    cart.map(item => `
<div style="margin-bottom:10px;border-bottom:1px solid #ddd;padding-bottom:8px;">

<b>${item.name}</b><br>

<button onclick="changeQty('${item.name}',-1)">âž–</button>

<b style="padding:0 10px;">${item.qty}</b>

<button onclick="changeQty('${item.name}',1)">âž•</button>

&nbsp;&nbsp; â‚¹${item.price * item.qty}

</div>
`).join("<br>");

}

function addToCart(name, price) {

  const item = cart.find(p => p.name === name);

  if (item) {
    item.qty++;
  } else {
    cart.push({
      name: name,
      price: Number(price),
      qty: 1
    });
  }

  total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;
  });

  renderCart();
}

function clearCart() {

  cart = [];
  total = 0;

  renderCart();

}
    function changeQty(name, change) {

  const item = cart.find(p => p.name === name);

  if (!item) return;

  item.qty += change;

  if (item.qty <= 0) {
    cart = cart.filter(p => p.name !== name);
  }

  total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;
  });

  renderCart();

    }

window.editProduct = async function(id, oldName, oldPrice, oldOffer) {

  const name = prompt("Product Name", oldName);
  if (name === null) return;

  const price = prompt("Price", oldPrice);
  if (price === null) return;

  const offer = prompt("Offer Price", oldOffer);
  if (offer === null) return;

  try {

    await updateDoc(doc(db, "products", id), {
      name: name,
      price: Number(price),
      offerPrice: Number(offer)
    });

    alert("âœ… Product Updated");

    loadProducts();

  } catch (e) {

};

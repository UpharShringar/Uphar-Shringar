  window.isAdmin = false;

function adminLogin() {

  const password = document.getElementById("adminPassword").value;

  if (password === "12345") {
    
    document.getElementById("adminPanel").style.display = "block";
    

    window.isAdmin = true;

    document.getElementById("adminLogin").style.display = "none";

    window.loadProducts();

    alert("✅ Admin Login Successful");

  } else {

    alert("❌ Wrong Password");

  }

}

let cart = [];
let total = 0;

let qty = {};

function changeQty(name, price, change){

if(!qty[name]) qty[name]=0;

qty[name]+=change;

if(qty[name]<0) qty[name]=0;

document.getElementById("qty_"+name.replace(/\s/g,'')).innerText=qty[name];

cart=[];
total=0;

for(let item in qty){

if(qty[item]>0){

for(let i=0;i<qty[item];i++){

cart.push({name:item,price:price});

total+=Number(price);

}

}

}

document.getElementById("cartTotal").innerText=total;

document.getElementById("cartItems").innerHTML=

cart.map(item=>"• "+item.name+" - ₹"+item.price).join("<br>");

if(cart.length==0){

document.getElementById("cartItems").innerHTML="No items in cart";

}

}    
function addToCart(name, price) {
  cart.push({ name, price });
  total += Number(price);

  document.getElementById("cartTotal").innerText = total;

  document.getElementById("cartItems").innerHTML =
    cart.map(item => "• " + item.name + " - ₹" + item.price).join("<br>");
}
function buyNow(name, price){

cart = [];
total = 0;

addToCart(name, price);

document.getElementById("fullname").scrollIntoView({
behavior:"smooth"
});

    }
    function toggleMenu(){

const menu=document.getElementById("sideMenu");

if(menu.style.width=="250px"){
menu.style.width="0";
}else{
menu.style.width="250px";
}

    }
    function toggleCart() {
  const cart = document.getElementById("cartPanel");

  if (cart.style.display === "block") {
    cart.style.display = "none";
  } else {
    cart.style.display = "block";
  }
    }
function clearCart() {
  cart = [];
  total = 0;

  document.getElementById("cartItems").innerHTML = "No items in cart";
  document.getElementById("cartTotal").innerText = "0";
}
</script>

window.editProduct = async function(id, oldName, oldPrice, oldOffer, oldImage) {

const name = prompt("Product Name", oldName);
if (name === null) return;

const price = prompt("Price", oldPrice);
if (price === null) return;

const offerPrice = prompt("Offer Price", oldOffer);
if (offerPrice === null) return;
  
  const category = prompt("Category", "Lipstick");

const input = document.createElement("input");
input.type = "file";
input.accept = "image/*";

input.onchange = async () => {

let imageUrl = oldImage;

const file = input.files[0];

if (file) {

const formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", "uphar_upload");

const response = await fetch(
"https://api.cloudinary.com/v1_1/rms6dpzs/image/upload",
{
method: "POST",
body: formData
}
);

const data = await response.json();

if (data.secure_url) {
imageUrl = data.secure_url;
}

}

try {

await updateDoc(doc(db, "products", id), {
name: name,
category: category,
price: Number(price),
offerPrice: Number(offerPrice),
image: imageUrl
});

alert("✅ Product Updated");

loadProducts();

} catch(e){
alert("❌ " + e.message);
}

};

input.click();

};
window.deleteProduct = async function(id) {

  if (!confirm("Delete this product?")) return;

  try {

    await deleteDoc(doc(db, "products", id));

    alert("✅ Product Deleted");

    loadProducts();

  } catch (e) {

    alert("❌ " + e.message);

  }

};
  async function loadDashboard() {

const products = await getDocs(collection(db, "products"));
const orders = await getDocs(collection(db, "orders"));

document.getElementById("totalProducts").innerText = products.size;
document.getElementById("totalOrders").innerText = orders.size;

let customers = new Set();
let sales = 0;

orders.forEach(doc => {
const data = doc.data();

customers.add(data.mobile);

sales += Number(data.total || 0);
});

document.getElementById("totalCustomers").innerText = customers.size;
document.getElementById("totalSales").innerText = sales;

  }
loadProducts();
loadDashboard();
